version: "2"
run:
  timeout: 5m
  go: 1.26.3
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
output:
  formats: {}
linters:
  disable:
    - exhaustruct
    - gochecknoglobals
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - gosmopolitan
    - govet
    - ineffassign
    - interfacebloat
    - intrange
    - loggercheck
    - maintidx
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - wrapcheck
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    dupl:
      threshold: 100
    gocritic:
      disabled-checks:
        - ifElseChain
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - goconst
          - dupl
          - errcheck
          - paralleltest
          - revive
      - path: diagnose/
        linters:
          - wrapcheck
          - noctx
      - path: agent/
        linters:
          - wrapcheck
      - path: examples/
        linters:
          - gosec
      - path: _test\.go
        text: unused
        linters:
          - unused
    paths:
      - \.gen\.go$
      - _templ\.go$
      - vendor/
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - _templ\.go$
issues: {}
