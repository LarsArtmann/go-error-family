version: "2"
run:
  timeout: 5m
  go: 1.26.4
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
output:
  formats: {}
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - clickhouselint
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - $module
            - github.com/larsartmann/go-error-family
            - github.com/samber/oops
    dupl:
      threshold: 100
    exhaustruct:
      exclude:
        - os/exec.Cmd
        - os/exec.ExitError
        - net.Dialer
        - github.com/larsartmann/go-error-family.HandleConfig
        - github.com/larsartmann/go-error-family.HandleResult
        - github.com/larsartmann/go-error-family.MessageTemplate
        - github.com/larsartmann/go-error-family.RetryPolicy
        - github.com/larsartmann/go-error-family.jsonError
        - github.com/larsartmann/go-error-family.DiagnosticFinding
        - github.com/larsartmann/go-error-family.Registry
        - github.com/larsartmann/go-error-family.familyInfo
        - github.com/larsartmann/go-error-family/diagnose.DiagnosticResult
        - github.com/larsartmann/go-error-family/diagnose.Fix
        - github.com/larsartmann/go-error-family/diagnose.Runner
        - github.com/larsartmann/go-error-family/diagnose.RuleSpec
        - github.com/larsartmann/go-error-family/diagnose.MockCommandRunner
        - github.com/larsartmann/go-error-family/diagnose.MockResponse
        - github.com/larsartmann/go-error-family/diagnose.ruleResult
        - github.com/larsartmann/go-error-family/diagnose.staticRule
        - github.com/larsartmann/go-error-family/agent.AgentResult
        - github.com/larsartmann/go-error-family/agent.Config
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    gocritic:
      disabled-checks:
        - ifElseChain
    gomoddirectives:
      replace-local: true
    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
    makezero:
      always: true
    mnd:
      ignored-files:
        - family\.go
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
    testifylint:
      disable:
        - go-require
      enable-all: true
    varnamelen:
      ignore-map-index-ok: true
      ignore-names:
        - err
        - ok
        - tt
        - fn
        - t
        - i
        - m
        - g
        - a
        - b
        - v
        - tc
        - f
        - w
        - ag
      ignore-type-assert-ok: true
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - goconst
          - dupl
          - errcheck
          - paralleltest
          - revive
          - exhaustruct
          - err113
          - testpackage
          - fatcontext
          - funlen
          - containedctx
      - path: diagnose/
        linters:
          - wrapcheck
          - noctx
      - path: diagnose/rules_filesystem\.go
        text: G304
        linters:
          - gosec
      - path: agent/
        linters:
          - wrapcheck
      - path: bridge/
        linters:
          - wrapcheck
      - path: examples/
        linters:
          - gosec
          - forbidigo
      - path: _test\.go
        text: unused
        linters:
          - unused
    paths:
      - \.gen\.go$
      - _mock\.go$
      - _templ\.go$
      - diagnose/
      - diagnose/git/
      - vendor/
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - _mock\.go$
      - _templ\.go$
      - diagnose/
      - diagnose/git/
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
