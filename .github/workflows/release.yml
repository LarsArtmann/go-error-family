name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run tests (workspace)
        run: go test -race ./...

      - name: Run tests (git submodule)
        working-directory: ./diagnose/git
        run: go test -race ./...

      - name: Run tests (postgres submodule)
        working-directory: ./diagnose/postgres
        run: go test -race ./...

      - name: Verify root builds without workspace
        run: GOWORK=off go build ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: latest
          args: --timeout=5m

      - name: Run golangci-lint (git submodule)
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: latest
          args: --timeout=5m
          working-directory: ./diagnose/git

      - name: Run golangci-lint (postgres submodule)
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: latest
          args: --timeout=5m
          working-directory: ./diagnose/postgres

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
