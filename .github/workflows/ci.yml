name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run tests (workspace)
        run: go test -race -count=1 ./...

      - name: Run tests (diagnose module)
        working-directory: ./diagnose
        run: go test -race -count=1 ./...

      - name: Run tests (agent module)
        working-directory: ./agent
        run: go test -race -count=1 ./...

      - name: Run tests (bridge submodule)
        working-directory: ./bridge
        run: go test -race -count=1 ./...

      - name: Run tests (git submodule)
        working-directory: ./diagnose/git
        run: go test -race -count=1 ./...

      - name: Run tests (postgres submodule)
        working-directory: ./diagnose/postgres
        run: go test -race -count=1 ./...

      - name: Verify root builds without workspace
        run: GOWORK=off go build ./...

      - name: Verify root module graph resolves (GOWORK=off)
        run: GOWORK=off go list -m all

      - name: Run go vet
        run: go vet ./...

      - name: Verify examples compile
        working-directory: ./examples
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Run golangci-lint (diagnose module)
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2
          args: --timeout=5m
          working-directory: ./diagnose

      - name: Run golangci-lint (agent module)
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2
          args: --timeout=5m
          working-directory: ./agent

      - name: Run golangci-lint (bridge submodule)
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2
          args: --timeout=5m
          working-directory: ./bridge

      - name: Run golangci-lint (git submodule)
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2
          args: --timeout=5m
          working-directory: ./diagnose/git

      - name: Run golangci-lint (postgres submodule)
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2
          args: --timeout=5m
          working-directory: ./diagnose/postgres

  consumer-simulation:
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Simulate consumer importing root module
        run: |
          tmpdir=$(mktemp -d)
          cd "$tmpdir"
          go mod init consumer-test
          printf 'package main\n\nimport _ "github.com/larsartmann/go-error-family"\n\nfunc main() {}\n' > main.go
          GOWORK=off go mod edit -replace github.com/larsartmann/go-error-family=$GITHUB_WORKSPACE
          GOWORK=off go mod tidy
          GOWORK=off go build ./...
          GOWORK=off go list -m all
