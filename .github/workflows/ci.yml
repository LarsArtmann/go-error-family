name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run tests (workspace)
        run: go test -race -count=1 ./...

      - name: Run tests (bridge submodule)
        working-directory: ./bridge
        run: go test -race -count=1 ./...

      - name: Run tests (git submodule)
        working-directory: ./diagnose/git
        run: go test -race -count=1 ./...

      - name: Run tests (postgres submodule)
        working-directory: ./diagnose/postgres
        run: go test -race -count=1 ./...

      - name: Verify root builds without workspace
        run: GOWORK=off go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run golangci-lint (bridge submodule)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: ./bridge

      - name: Run golangci-lint (git submodule)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: ./diagnose/git

      - name: Run golangci-lint (postgres submodule)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: ./diagnose/postgres
